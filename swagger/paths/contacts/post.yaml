tags:
  - Contacts
summary: Create a new contact
operationId: createContact
description: Create a new contact with an optional photo upload. Requires authentication.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
          phoneNumber:
            type: string
          photo:
            type: string
            format: binary
responses:
  '201':
    description: Successful creation
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: 'Contact created'
            data:
              type: object
              properties:
                contact:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                    phoneNumber:
                      type: string
                    isFavourite:
                      type: boolean
                    contactType:
                      type: string
                    photo:
                      type: string
                    userId:
                      type: string
                    createdAt:
                      type: string
                    updatedAt:
                      type: string
  '400':
    description: Invalid input
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: 'Invalid data'
