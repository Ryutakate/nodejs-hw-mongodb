tags:
  - Contacts
summary: Get all contacts
operationId: getAllContacts
description: Retrieve a list of all contacts with optional filtering. Requires authentication.
security:
  - bearerAuth: []
parameters:
  - name: limit
    in: query
    required: false
    schema:
      type: integer
      default: 10
    description: Number of contacts to return
  - name: page
    in: query
    required: false
    schema:
      type: integer
      default: 1
    description: Page number for pagination
responses:
  '200':
    description: Successful response with contacts list
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Contacts retrieved successfully
            data:
              type: object
              properties:
                contacts:
                  type: array
                  items:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      phoneNumber:
                        type: string
                        photo:
                          type: string
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Unauthorized
