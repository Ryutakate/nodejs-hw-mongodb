tags:
  - Contacts
summary: Get all contacts
operationId: getAllContacts
description: Retrieve a paginated list of all contacts with filtering and sorting. Requires authentication.
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    required: false
    schema:
      type: integer
      default: 1
    description: Page number for pagination
  - name: perPage
    in: query
    required: false
    schema:
      type: integer
      default: 10
    description: Number of contacts per page
  - name: sortBy
    in: query
    required: false
    schema:
      type: string
      default: name
    description: Field to sort by (e.g., name)
  - name: sortOrder
    in: query
    required: false
    schema:
      type: string
      enum: [asc, desc]
      default: asc
    description: Sort order (asc or desc)
  - name: type
    in: query
    required: false
    schema:
      type: string
    description: Filter by contact type
  - name: isFavourite
    in: query
    required: false
    schema:
      type: string
      enum: [true, false]
    description: Filter by favorite status
responses:
  '200':
    description: Successful response with paginated contacts
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Contacts retrieved successfully'
            data:
              type: object
              properties:
                totalItems:
                  type: integer
                  example: 50
                totalPages:
                  type: integer
                  example: 5
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 10
                contacts:
                  type: array
                  items:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      phoneNumber:
                        type: string
                      photo:
                        type: string
                      contactType:
                        type: string
                      isFavourite:
                        type: boolean
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: 'Unauthorized'
