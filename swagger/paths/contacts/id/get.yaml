tags:
  - Contacts
summary: Get a contact by ID
operationId: getContactById
description: Retrieve details of a specific contact by its ID. Requires authentication.
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: The ID of the contact to retrieve
responses:
  '200':
    description: Successful response with contact details
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Contact retrieved successfully'
            data:
              type: object
              properties:
                contact:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                    phoneNumber:
                      type: string
                    photo:
                      type: string
                    contactType:
                      type: string
                    isFavourite:
                      type: boolean
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: 'Contact not found'
