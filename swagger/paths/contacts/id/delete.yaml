tags:
  - Contacts
summary: Delete a contact by ID
operationId: deleteContact
description: Delete a specific contact. Requires authentication.
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: The ID of the contact to delete
responses:
  '204':
    description: Successful deletion with no content
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: 'Contact not found'
