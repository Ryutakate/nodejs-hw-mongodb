tags:
  - Contacts
summary: Update a contact by ID
operationId: updateContact
description: Update details of a specific contact with an optional photo. Requires authentication.
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: The ID of the contact to update
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
          phoneNumber:
            type: string
          photo:
            type: string
            format: binary
responses:
  '200':
    description: Successful update
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Contact updated'
            data:
              type: object
              properties:
                contact:
                  $ref: '#/components/schemas/Contact'
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: 'Contact not found'
